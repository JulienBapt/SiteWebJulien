<footer class="footer" role="contentinfo">

  <div class="footer-inner">

    <!-- Gauche : marque + copyright -->
    <div class="footer-brand">
      <p class="footer-name">{{ author() }}</p>
      <p class="footer-copy">Biographie &nbsp;·&nbsp; © {{ year() }}</p>
    </div>

    <!-- Ornement -->
    <div class="footer-ornament" aria-hidden="true">✦</div>

    <!-- Centre : liens -->
    <nav class="footer-nav" aria-label="Liens légaux et contact">
      @for (link of links(); track link.href) {
        <a [href]="link.href" class="footer-link">{{ link.label }}</a>
      }
    </nav>

    <!-- Ornement -->
    <div class="footer-ornament" aria-hidden="true">✦</div>

    <!-- Droite : contact -->
    <div class="footer-contact-bloc">
      <a href="mailto:journalisme.irrespectueux@free.fr" class="footer-name footer-contact">Contact</a>
      <a href="mailto:journalisme.irrespectueux@free.fr" class="footer-copy footer-contact-text">Pour m'envoyer un mail</a>
    </div>

  </div>

</footer>
