<section class="preface" id="preface" aria-labelledby="preface-heading">

  <div class="preface-inner">
    <p class="section-label" aria-hidden="true">Préface</p>

    <div class="preface-grid">

      <div class="preface-left">
        <h2 class="preface-heading" id="preface-heading">{{ heading() }}</h2>
        <div class="preface-ornament" aria-hidden="true">
          <span class="ornament-line"></span>
          <span class="ornament-diamond">◆</span>
          <span class="ornament-line"></span>
        </div>
      </div>

      <article  class="preface-right" aria-label="Texte de la préface">
        @for (p of paragraphs(); track $index) {
          <p class="preface-body">{{ p }}</p>
        }
      </article >

    </div>
  </div>

</section>
