<section class="hero" aria-label="Présentation du livre">

  <!-- Côté texte -->
  <div class="hero-text">
    <p class="hero-eyebrow">Biographie</p>

    <h1 class="hero-title">
      {{ book.titleLine1 }}<br>
      <em>{{ book.titleLine2 }}</em><br>
      {{ book.titleLine3 }}
    </h1>

    <p class="hero-subtitle">{{ book.subtitle }}</p>

    <div class="hero-meta" aria-label="Informations du livre">
      <span>{{ book.author }}</span>
      <span class="sep" aria-hidden="true"></span>
      <span>{{ book.year }}</span>
      <span class="sep" aria-hidden="true"></span>
      <span>{{ book.pages }}</span>
    </div>

    <a [href]="book.ctaAnchor" class="hero-cta">
      {{ book.ctaLabel }}
    </a>
  </div>

  <!-- Côté couverture -->
  <div class="hero-image" aria-hidden="true">
    <div class="hero-image-inner">
      <div class="book-cover">
        <div class="book-spine"></div>
        <p class="book-cover-title">{{ book.titleLine1 }} {{ book.titleLine2 }} {{ book.titleLine3 }}</p>
        <div class="book-cover-line"></div>
        <p class="book-cover-author">{{ book.author }}</p>
      </div>
    </div>
  </div>

</section>
