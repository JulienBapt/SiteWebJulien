<nav class="nav" role="navigation" aria-label="Navigation principale">
  <a class="nav-logo" href="#" aria-label="Retour en haut de page">
    Claude Julien
  </a>

  <!-- Desktop links -->
  <ul class="nav-links" role="list">
    @for (link of links(); track link.anchor) {
      <li>
        <a [href]="link.anchor" class="nav-link">{{ link.label }}</a>
      </li>
    }
  </ul>

  <!-- Mobile burger -->
  <button
    class="nav-burger"
    [class.is-open]="menuOpen()"
    (click)="toggleMenu()"
    aria-label="Ouvrir le menu"
    [attr.aria-expanded]="menuOpen()">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<!-- Mobile drawer -->
<div class="nav-drawer" [class.is-open]="menuOpen()" role="dialog" aria-label="Menu mobile">
  <ul role="list">
    @for (link of links(); track link.anchor) {
      <li>
        <a [href]="link.anchor" class="nav-drawer-link" (click)="toggleMenu()">
          {{ link.label }}
        </a>
      </li>
    }
  </ul>
</div>
