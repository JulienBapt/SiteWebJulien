<section class="gallery" id="galerie" aria-labelledby="gallery-heading">

  <div class="gallery-inner">
    <h2 class="gallery-heading section-label" id="gallery-heading">
      <span>Galerie</span>
      <span class="gallery-heading-subtitle"><br>(Cliquez pour agrandir)</span>
      <span class="visually-hidden" aria-hidden="true"> Galerie photos — {{ photos().length }} photos de Claude Julien</span>
    </h2>
    <div class="gallery-grid" role="list">
      @for (photo of photos(); track photo.src; let i = $index) {
        <figure
          class="photo-card"
          role="figure"
          (click)="openLightbox(i)"
          (keydown.enter)="openLightbox(i)"
          (keydown.space)="openLightbox(i)"
          tabindex="0"
          [attr.aria-label]="'Agrandir : ' + photo.caption + ' ' + photo.year">
          <img
            [src]="photo.src"
            [alt]="photo.alt"
            loading="lazy"
            class="photo-img"
            width="400"
            height="533"
            [attr.title]="photo.caption + ' — ' + photo.year" />
          <div class="photo-overlay" aria-hidden="true">
            <figcaption class="photo-caption">
              <p class="photo-caption-title">{{ photo.caption }}</p>
              <p class="photo-caption-year">{{ photo.year }}</p>
            </figcaption>
          </div>
        </figure>
      }
    </div>
  </div>

</section>

<!-- Lightbox -->
@if (lightboxOpen()) {
  <div
    class="lightbox"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="'Photos : ' + photos()[lightboxIndex()].caption"
    (click)="closeLightbox()" (keydown)="useArrow($event)">

    <div class="lightbox-content" (click)="$event.stopPropagation()">
      <button #focusForKeydown class="lightbox-close" (click)="closeLightbox()" aria-label="Fermer la galerie">✕</button>

      <figure class="lightbox-figure">
        <img
          [src]="photos()[lightboxIndex()].srcNotZoom || photos()[lightboxIndex()].src"
          [alt]="photos()[lightboxIndex()].alt"
          class="lightbox-img"
          width="800"
          height="1067" />

        <figcaption  class="lightbox-caption">
          <p class="lightbox-caption-title">{{ photos()[lightboxIndex()].caption }}</p>
          <p class="lightbox-caption-year">{{ photos()[lightboxIndex()].year }}</p>
        </figcaption >
      </figure>

      <div class="lightbox-nav" aria-label="Navigation photos">
        <button class="lightbox-btn" (click)="prevPhoto()" aria-label="Photo précédente">←</button>
        <span class="lightbox-counter" aria-live="polite">
          {{ lightboxIndex() + 1 }} / {{ photos().length }}
        </span>
        <button class="lightbox-btn" (click)="nextPhoto()" aria-label="Photo suivante">→</button>
      </div>
    </div>

  </div>
}
